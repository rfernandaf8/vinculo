          <option value="">Selecione</option>
          ${['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'].map(d => `<option ${p.sessionDay===d?'selected':''}>${d}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Horário</label>
        <input type="time" id="ep_time" class="form-input" value="${p.sessionTime || ''}">
      </div>
      <div class="form-group">
        <label class="form-label">Duração (min)</label>
        <input type="number" id="ep_dur" class="form-input" value="${p.sessionDuration || 50}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select id="ep_status" class="form-select">
        <option value="active" ${p.status==='active'?'selected':''}>Ativo</option>
        <option value="paused" ${p.status==='paused'?'selected':''}>Em pausa</option>
        <option value="encerrado" ${p.status==='encerrado'?'selected':''}>Encerrado</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="savePatientEdit('${patientId}')">Salvar</button>
    </div>`);
}

function savePatientEdit(patientId) {
  const d = getData();
  const p = d.patients.find(x => x.id === patientId);
  if (!p) return;
  p.name = document.getElementById('ep_name').value.trim() || p.name;
  p.initials = document.getElementById('ep_initials').value.trim() || p.initials;
  p.dob = document.getElementById('ep_dob').value;
  p.whatsapp = document.getElementById('ep_whatsapp').value.trim();
  p.sessionDay = document.getElementById('ep_day').value;
  p.sessionTime = document.getElementById('ep_time').value;
  p.sessionDuration = document.getElementById('ep_dur').value;
  p.status = document.getElementById('ep_status').value;
  saveData(d);
  closeModal();
  renderSidebarPatients();
  showPatient(patientId);
}

function confirmDeletePatient(patientId) {
  const d = getData();
  const p = d.patients.find(x => x.id === patientId);
  if (!p) return;
  if (!confirm(`Excluir permanentemente o paciente "${p.name}" e todos os seus dados? Esta ação não pode ser desfeita.`)) return;
  if (!confirm('Tem certeza? Todos os dados serão apagados.')) return;
  d.patients = d.patients.filter(x => x.id !== patientId);
  d.sessions = d.sessions.filter(x => x.patientId !== patientId);
  d.hypotheses = d.hypotheses.filter(x => x.patientId !== patientId);
  d.strategies = d.strategies.filter(x => x.patientId !== patientId);
  d.packages = d.packages.filter(x => x.patientId !== patientId);
  d.documents = d.documents.filter(x => x.patientId !== patientId);
  d.supervisionNotes = d.supervisionNotes.filter(x => x.patientId !== patientId);
  saveData(d);
  currentPatientId = null;
  renderSidebarPatients();
  showView('dashboard');
}

      <p style="font-size:13px;color:var(--ink-muted);margin-bottom:14px">Necessária para análise de sessões com IA, geração de hipóteses e documentos automáticos.</p>

        <input type="password" id="apikey_input" class="form-input" value="${ANTHROPIC_API_KEY}" placeholder="sk-ant-...">
      </div>

        <label class="form-label">Nova Senha de Acesso</label>

      </div>
      <div class="form-group">
        <label class="form-label">Confirmar Nova Senha</label>
        <input type="password" id="conf_pass" class="form-input" placeholder="Confirme a senha">
      </div>
      <div style="display:flex;justify-content:flex-end">
        <button class="btn btn-primary btn-sm" onclick="changePassword()">Alterar Senha</button>

    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><div class="card-title">💾 Backup dos Dados</div></div>
      <p style="font-size:13px;color:var(--ink-muted);margin-bottom:14px">Exporte todos os dados para um arquivo JSON. Guarde em local seguro.</p>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="exportData()">⬇ Exportar backup</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('importFile').click()">⬆ Importar backup</button>
        <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
      </div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">🗑 Área de Risco</div></div>
      <p style="font-size:13px;color:var(--rose);margin-bottom:14px">Apagar todos os dados do Vínculo. Esta ação é irreversível.</p>
      <button class="btn btn-danger btn-sm" onclick="resetAllData()">Apagar todos os dados</button>
    </div>`;
}

function saveApiKey() {
  const key = document.getElementById('apikey_input').value.trim();
  ANTHROPIC_API_KEY = key;
  localStorage.setItem('vinculo_apikey', key);
  alert('Chave salva com sucesso!');
}

function clearApiKey() {
  ANTHROPIC_API_KEY = '';
  localStorage.removeItem('vinculo_apikey');
  document.getElementById('apikey_input').value = '';
  alert('Chave removida.');
}

function changePassword() {
  const np = document.getElementById('new_pass').value;
  const cp = document.getElementById('conf_pass').value;
  if (!np) { alert('Digite a nova senha.'); return; }
  if (np !== cp) { alert('Senhas não conferem.'); return; }
  if (np.length < 6) { alert('Senha deve ter ao menos 6 caracteres.'); return; }
  localStorage.setItem(PASS_KEY, np);
  alert('Senha alterada com sucesso!');
}

function exportData() {
  const d = getData();
  const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `vinculo_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!confirm('Importar este backup? Os dados atuais serão substituídos.')) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      saveData(data);
      alert('Backup importado com sucesso!');
      initApp();
    } catch(err) {
      alert('Arquivo inválido.');
    }
  };
  reader.readAsText(file);
}

function resetAllData() {
  if (!confirm('ATENÇÃO: Apagar TODOS os dados do Vínculo? Esta ação não pode ser desfeita.')) return;
  if (!confirm('Tem certeza absoluta? Todos os pacientes e registros serão apagados.')) return;
  saveData(defaultData());
  initApp();
}

  document.getElementById('modalContent').innerHTML = html;

// ═══════════════════════════════════════════════════════════════
// AI API CALL
// ═══════════════════════════════════════════════════════════════
async function callAI(prompt, maxTokens = 1500) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!response.ok) throw new Error('API error: ' + response.status);
  const data = await response.json();
  const text = data.content.map(c => c.text || '').join('');

  // Try to parse as JSON
  try {
    const clean = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
    return JSON.parse(clean);
  } catch {
    return text;
  }
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  try {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  } catch { return dateStr; }
}
